<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Global Design Leadership Association</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    /* ─── styleguide.css variables ─── */
    :root {
      --background: rgba(255,255,255,1);
      --paragraph-1: rgba(0,0,0,1);
      --paragraph-2: rgba(118,118,118,1);
      --divider: rgba(0,0,0,1);

      --header-header-1-font-family: "Instrument Sans", Helvetica;
      --header-header-1-font-weight: 400;
      --header-header-1-font-size: 64px;
      --header-header-1-letter-spacing: -3.2px;
      --header-header-1-line-height: 100%;
      --header-header-1-font-style: normal;

      --header-header-2-font-family: "Instrument Sans", Helvetica;
      --header-header-2-font-weight: 400;
      --header-header-2-font-size: 37px;
      --header-header-2-letter-spacing: -1.11px;
      --header-header-2-line-height: 100%;
      --header-header-2-font-style: normal;

      --header-header-5-font-family: "Instrument Sans", Helvetica;
      --header-header-5-font-weight: 600;
      --header-header-5-font-size: 16px;
      --header-header-5-letter-spacing: -0.48px;
      --header-header-5-line-height: 100%;
      --header-header-5-font-style: normal;

      --paragraph-1-font-family: "Instrument Sans", Helvetica;
      --paragraph-1-font-weight: 400;
      --paragraph-1-font-size: 20px;
      --paragraph-1-letter-spacing: -1px;
      --paragraph-1-line-height: 121%;
      --paragraph-1-font-style: normal;

      --paragraph-2-font-family: "Instrument Sans", Helvetica;
      --paragraph-2-font-weight: 400;
      --paragraph-2-font-size: 16px;
      --paragraph-2-letter-spacing: -0.48px;
      --paragraph-2-line-height: 110%;
      --paragraph-2-font-style: normal;

      --display-1-font-family: "Instrument Sans", Helvetica;
      --display-1-font-weight: 400;
      --display-1-font-size: 105px;
      --display-1-letter-spacing: -5.25px;
      --display-1-line-height: 110%;
      --display-1-font-style: normal;

      --text-link-font-family: "Instrument Sans", Helvetica;
      --text-link-font-weight: 500;
      --text-link-font-size: 16px;
      --text-link-letter-spacing: -0.48px;
      --text-link-line-height: 110%;
      --text-link-font-style: normal;

      --nav-link-font-family: "Instrument Sans", Helvetica;
      --nav-link-font-weight: 400;
      --nav-link-font-size: 20px;
      --nav-link-letter-spacing: -1px;
      --nav-link-line-height: 100%;
      --nav-link-font-style: normal;
    }

    /* ─── globals.css reset ─── */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    * { -webkit-font-smoothing: antialiased; }
    a { text-decoration: none; }
    img { display: block; }
    h1, h2, h3, h4, h5, h6, p { margin: 0; padding: 0; }
    button:focus-visible {
      outline: 2px solid #4a90e2 !important;
    }
    @font-face {
      font-family: "Instrument Sans";
      src: local("Instrument Sans");
    }

    /* ─── Desktop wrapper ─── */
    .desktop {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
      align-items: center;
      padding: 0 40px;
      position: relative;
      background-color: var(--background);
    }

    /* ─── NAV ─── */
    .nav-header-2 {
      display: flex;
      width: 100%;
      height: 46px;
      align-items: center;
      padding: 0 40px;
      position: fixed;
      top: 0; left: 0;
      z-index: 200;
      background-color: var(--background);
      max-width: 1280px;
      left: 50%;
      transform: translateX(-50%);
    }
    /* fallback for full-width */
    @supports not (max-width: 1280px) {
      .nav-header-2 { left: 0; transform: none; }
    }
    .logotype-contain {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px 10px 0;
      position: relative;
      flex: 1;
      align-self: stretch;
      flex-grow: 1;
      border-bottom: 1px solid var(--divider);
    }
    .f-f-logo {
      position: relative;
      width: 310px;
      height: 24px;
    }
    .nav-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 0 0 4px;
      position: relative;
    }
    .nav-link .link {
      position: relative;
      width: fit-content;
      font-family: "Instrument Sans", Helvetica;
      font-weight: 400;
      color: #000;
      font-size: 20px;
      letter-spacing: -1px;
      line-height: 20px;
      white-space: nowrap;
    }
    .links-contain {
      display: flex;
      max-width: 615px;
      align-items: flex-start;
      justify-content: flex-end;
      gap: 189px;
      position: relative;
      flex: 1;
      flex-grow: 1;
      align-self: stretch;
    }
    .text-links {
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      gap: 50px;
      padding: 12px 0 10px 20px;
      position: relative;
      flex: 1;
      align-self: stretch;
      flex-grow: 1;
      background-color: var(--background);
      border-bottom: 1px solid var(--divider);
    }
    .link-wrapper {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 0 0 4px;
      position: relative;
      flex: 0 0 auto;
    }
    .link-2 {
      width: fit-content;
      white-space: nowrap;
      position: relative;
      font-family: var(--nav-link-font-family);
      font-weight: var(--nav-link-font-weight);
      color: var(--paragraph-1);
      font-size: var(--nav-link-font-size);
      letter-spacing: var(--nav-link-letter-spacing);
      line-height: var(--nav-link-line-height);
    }
    .link-2:hover, .nav-link:hover { opacity: 0.6; }

    /* ─── Nav spacer ─── */
    .nav-spacer {
      height: 46px;
      width: 100%;
      flex-shrink: 0;
    }

    /* ─── MAIN ─── */
    .main {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      position: relative;
      align-self: stretch;
      width: 100%;
      flex: 0 0 auto;
    }

    /* ─── INTRO / HERO ─── */
    .intro-section {
      display: flex;
      flex-direction: column;
      max-width: 1920px;
      align-items: flex-start;
      gap: 32px;
      padding: 15px 0 120px;
      position: relative;
      width: 100%;
      flex: 0 0 auto;
    }
    .frame-logos {
      display: inline-flex;
      align-items: center;
      gap: 20px;
      position: relative;
      flex: 0 0 auto;
    }
    .frame-logos .img {
      position: relative;
      width: 80px;
      height: 80px;
      object-fit: contain;
    }
    .intro-h1 {
      position: relative;
      align-self: stretch;
      font-family: var(--header-header-1-font-family);
      font-weight: var(--header-header-1-font-weight);
      color: #000;
      font-size: var(--header-header-1-font-size);
      letter-spacing: var(--header-header-1-letter-spacing);
      line-height: var(--header-header-1-line-height);
    }
    .flexcontainer {
      width: 100%;
      max-width: 1200px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
    }
    .flexcontainer .div {
      position: relative;
      align-self: stretch;
      font-family: var(--paragraph-1-font-family);
      font-weight: var(--paragraph-1-font-weight);
      color: #000;
      font-size: var(--paragraph-1-font-size);
      letter-spacing: var(--paragraph-1-letter-spacing);
      line-height: var(--paragraph-1-line-height);
    }

    /* ─── Hero cards screenshot ─── */
    .screenshot {
      position: relative;
      width: 100%;
      max-width: 1208px;
      height: auto;
      object-fit: cover;
      display: block;
      margin-bottom: 0;
    }

    /* ─── OUR WORKS section ─── */
    .stats-section {
      display: flex;
      flex-direction: column;
      max-width: 1920px;
      align-items: center;
      gap: 30px;
      padding: 67px 0 100px;
      width: 100%;
      flex: 0 0 auto;
      position: relative;
    }
    .divider-line {
      height: 1px;
      background: var(--divider);
      position: relative;
      align-self: stretch;
      width: 100%;
    }
    .our-work-content {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 0 0 40px;
      position: relative;
      align-self: stretch;
      width: 100%;
      flex: 0 0 auto;
    }
    .text-wrapper-2 {
      position: relative;
      width: fit-content;
      margin-top: -1px;
      font-family: var(--header-header-1-font-family);
      font-weight: var(--header-header-1-font-weight);
      color: #000;
      font-size: var(--header-header-1-font-size);
      letter-spacing: var(--header-header-1-letter-spacing);
      line-height: var(--header-header-1-line-height);
      white-space: nowrap;
    }
    .stats-content {
      display: flex;
      align-items: flex-start;
      padding: 0 0 100px;
      align-self: stretch;
      width: 100%;
      flex: 0 0 auto;
      position: relative;
    }
    .stats-body {
      display: flex;
      flex-wrap: wrap;
      max-width: 633px;
      align-items: flex-start;
      gap: 40px 0;
      flex: 1;
      flex-grow: 1;
      position: relative;
    }
    .branding-list {
      display: flex;
      flex-direction: column;
      min-width: 250px;
      max-width: 300px;
      align-items: flex-start;
      gap: 20px;
      padding: 0 20px 0 0;
      position: relative;
      flex: 1;
      flex-grow: 1;
    }
    .text-wrapper-3 {
      width: fit-content;
      margin-top: -1px;
      white-space: nowrap;
      position: relative;
      color: var(--paragraph-2);
      font-family: var(--paragraph-2-font-family);
      font-weight: var(--paragraph-2-font-weight);
      font-size: var(--paragraph-2-font-size);
      letter-spacing: var(--paragraph-2-letter-spacing);
      line-height: var(--paragraph-2-line-height);
    }
    .flexcontainer-2 {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
    }
    .flexcontainer-2 .div {
      position: relative;
      align-self: stretch;
      font-family: var(--paragraph-1-font-family);
      font-weight: var(--paragraph-1-font-weight);
      color: #000;
      font-size: var(--paragraph-1-font-size);
      letter-spacing: var(--paragraph-1-letter-spacing);
      line-height: var(--paragraph-1-line-height);
    }

    /* ─── PROJECT articles ─── */
    .project-article {
      display: flex;
      flex-direction: column;
      max-width: 1920px;
      align-items: flex-start;
      gap: 20px;
      padding: 0 0 50px;
      position: relative;
      width: 100%;
      flex: 0 0 auto;
    }
    .image-strip {
      width: calc(100% + 40px);
      height: auto;
      display: block;
      object-fit: cover;
    }
    /* Placeholder image strip for projects without photos */
    .image-strip-ph {
      width: calc(100% + 40px);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      height: 280px;
    }
    .image-strip-ph > div {
      width: 100%;
      height: 100%;
    }
    /* ─── Marquee image strip ─── */
    .marquee-container {
      overflow: hidden;
      width: 100%;
      position: relative;
    }
    .marquee-inner {
      display: flex;
      gap: 10px;
      animation: marqueeLeft 30s linear infinite;
      width: max-content;
    }
    .marquee-item {
      flex-shrink: 0;
      width: 460px;
      height: 460px;
      object-fit: cover;
      display: block;
    }
    .marquee-ph {
      flex-shrink: 0;
      width: 460px;
      height: 460px;
    }
    @keyframes marqueeLeft {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }
    .project-description {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      position: relative;
      align-self: stretch;
      width: 100%;
      flex: 0 0 auto;
    }
    .project-title {
      display: flex;
      width: 341px;
      align-items: flex-start;
      gap: 16px;
      position: relative;
    }
    .text-wrapper-4 {
      position: relative;
      width: fit-content;
      margin-top: -1px;
      font-family: var(--header-header-5-font-family);
      font-weight: var(--header-header-5-font-weight);
      color: var(--paragraph-2);
      font-size: var(--header-header-5-font-size);
      letter-spacing: var(--header-header-5-letter-spacing);
      line-height: var(--header-header-5-line-height);
      white-space: nowrap;
    }
    .titles {
      display: inline-flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 4px;
      position: relative;
      flex: 0 0 auto;
    }
    .titles .p {
      position: relative;
      width: 286px;
      margin-top: -1px;
      font-family: var(--header-header-5-font-family);
      font-weight: var(--header-header-5-font-weight);
      color: #000;
      font-size: var(--header-header-5-font-size);
      letter-spacing: var(--header-header-5-letter-spacing);
      line-height: var(--header-header-5-line-height);
    }
    .text-wrapper-5 {
      position: relative;
      width: 286px;
      font-family: var(--header-header-5-font-family);
      font-weight: var(--header-header-5-font-weight);
      color: var(--paragraph-2);
      font-size: var(--header-header-5-font-size);
      letter-spacing: var(--header-header-5-letter-spacing);
      line-height: var(--header-header-5-line-height);
    }
    .project-body-copy {
      display: flex;
      flex-direction: column;
      max-width: 360px;
      width: 316px;
      align-items: flex-start;
      gap: 30px;
      position: relative;
    }
    .text-wrapper-6 {
      position: relative;
      align-self: stretch;
      margin-top: -1px;
      font-family: var(--paragraph-2-font-family);
      font-weight: var(--paragraph-2-font-weight);
      color: #000;
      font-size: var(--paragraph-2-font-size);
      letter-spacing: var(--paragraph-2-letter-spacing);
      line-height: var(--paragraph-2-line-height);
    }
    .text-link {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      position: relative;
      flex: 0 0 auto;
      cursor: pointer;
    }
    .text-wrapper-7 {
      position: relative;
      width: fit-content;
      margin-top: -1px;
      font-family: var(--text-link-font-family);
      font-weight: var(--text-link-font-weight);
      color: var(--paragraph-2);
      font-size: var(--text-link-font-size);
      letter-spacing: var(--text-link-letter-spacing);
      line-height: var(--text-link-line-height);
      white-space: nowrap;
    }
    .see-more-projects {
      align-self: flex-end;
    }

    /* ─── THESIS section ─── */
    .awards-section {
      display: flex;
      flex-direction: column;
      max-width: 1920px;
      gap: 30px;
      padding: 0 0 100px;
      width: 100%;
      flex: 0 0 auto;
      align-items: flex-start;
      position: relative;
    }
    .awards-content {
      align-self: stretch;
      width: 100%;
      flex: 0 0 auto;
      display: flex;
      align-items: flex-start;
      position: relative;
    }
    .text-wrapper-8 {
      position: relative;
      flex: 1;
      margin-top: -1px;
      font-family: var(--header-header-1-font-family);
      font-weight: var(--header-header-1-font-weight);
      color: #000;
      font-size: var(--header-header-1-font-size);
      letter-spacing: var(--header-header-1-letter-spacing);
      line-height: var(--header-header-1-line-height);
    }
    .awards-list {
      display: flex;
      flex-direction: column;
      gap: 25px;
      flex: 1;
      flex-grow: 1;
      align-items: flex-start;
      position: relative;
    }
    .awards-list > a {
      display: block;
      align-self: stretch;
    }
    .award {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
      position: relative;
      align-self: stretch;
      width: 100%;
      flex: 0 0 auto;
    }
    .text-wrapper-9 {
      position: relative;
      align-self: stretch;
      margin-top: -1px;
      font-family: var(--paragraph-1-font-family);
      font-weight: var(--paragraph-1-font-weight);
      color: #000;
      font-size: var(--paragraph-1-font-size);
      letter-spacing: var(--paragraph-1-letter-spacing);
      line-height: var(--paragraph-1-line-height);
    }
    .frame-2 {
      display: inline-flex;
      align-items: flex-start;
      gap: 12px;
      position: relative;
      flex: 0 0 auto;
    }
    .text-wrapper-10 {
      position: relative;
      width: fit-content;
      margin-top: -1px;
      font-family: var(--paragraph-1-font-family);
      font-weight: var(--paragraph-1-font-weight);
      color: var(--paragraph-2);
      font-size: var(--paragraph-1-font-size);
      letter-spacing: var(--paragraph-1-letter-spacing);
      line-height: var(--paragraph-1-line-height);
      white-space: nowrap;
    }
    .text-wrapper-11 {
      position: relative;
      width: fit-content;
      margin-top: -1px;
      font-family: var(--paragraph-1-font-family);
      font-weight: var(--paragraph-1-font-weight);
      color: #000;
      font-size: var(--paragraph-1-font-size);
      letter-spacing: var(--paragraph-1-letter-spacing);
      line-height: var(--paragraph-1-line-height);
      white-space: nowrap;
    }
    .divider-2 {
      height: 1px;
      background: var(--divider);
      position: relative;
      align-self: stretch;
      width: 100%;
    }
    .frame-3 {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      gap: 12px;
      align-self: stretch;
      width: 100%;
      position: relative;
      flex: 0 0 auto;
    }

    /* ─── STATS numbers ─── */
    .stats-content-2 {
      display: flex;
      height: 346px;
      align-items: flex-start;
      gap: 20px;
      padding: 32px 0;
      position: relative;
      align-self: stretch;
      width: 100%;
    }
    .stat-content {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 40px;
      padding: 16px 16px 16px 0;
      position: relative;
      flex: 1;
      align-self: stretch;
      flex-grow: 1;
      border-right: 1px solid #000;
    }
    .stat-middle {
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      padding: 16px 16px 16px 0;
      align-self: stretch;
      border-right: 1px solid #000;
      flex: 1;
      flex-grow: 1;
      position: relative;
    }
    .stat-content-2 {
      display: flex;
      flex-direction: column;
      gap: 40px;
      flex: 1;
      flex-grow: 1;
      align-items: flex-start;
      position: relative;
    }
    .stat-last {
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      padding: 16px 16px 16px 0;
      align-self: stretch;
      flex: 1;
      flex-grow: 1;
      position: relative;
    }
    .text-wrapper-13 {
      position: relative;
      align-self: stretch;
      margin-top: -1px;
      font-family: var(--display-1-font-family);
      font-weight: var(--display-1-font-weight);
      color: #000;
      font-size: var(--display-1-font-size);
      letter-spacing: var(--display-1-letter-spacing);
      line-height: var(--display-1-line-height);
    }
    .stats-content-2 .div {
      font-family: var(--paragraph-1-font-family);
      font-weight: var(--paragraph-1-font-weight);
      color: #000;
      font-size: var(--paragraph-1-font-size);
      letter-spacing: var(--paragraph-1-letter-spacing);
      line-height: var(--paragraph-1-line-height);
    }

    /* ─── NEWS section — reuses awards-section styles ─── */

    /* ─── PRESIDENT & FOUNDER ─── */
    .our-team-section {
      display: flex;
      flex-direction: column;
      max-width: 1920px;
      align-items: flex-start;
      gap: 30px;
      padding: 0 0 100px;
      position: relative;
      width: 100%;
      flex: 0 0 auto;
    }
    .divider-3 {
      height: 1px;
      background: var(--divider);
      position: relative;
      align-self: stretch;
      width: 100%;
    }
    .team-content {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 80px;
      position: relative;
      align-self: stretch;
      width: 100%;
      flex: 0 0 auto;
    }
    .president-founder {
      position: relative;
      margin-top: -1px;
      font-family: var(--header-header-1-font-family);
      font-weight: var(--header-header-1-font-weight);
      color: #000;
      font-size: var(--header-header-1-font-size);
      letter-spacing: var(--header-header-1-letter-spacing);
      line-height: var(--header-header-1-line-height);
    }
    .frame-4 {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 24px;
      align-self: stretch;
      width: 100%;
      position: relative;
      flex: 0 0 auto;
    }
    .team-content-wrapper {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      align-self: stretch;
      width: 100%;
      position: relative;
      flex: 0 0 auto;
    }
    .team-content-2 {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      position: relative;
      flex: 1;
      flex-grow: 1;
    }
    .image {
      position: relative;
      width: 390px;
      height: 385px;
      object-fit: cover;
      object-position: top center;
      flex-shrink: 0;
    }
    .frame-5 {
      display: flex;
      flex-direction: column;
